# Path where Oracle Forms XML files are stored (e.g. myform_fmb.xml, myform_mmb.xml, myform_olb.xml)
forms2ng.path=/opt/forms2ng/

# Server port
server.port=8080

# Context path (keeps same URL pattern as before)
server.servlet.context-path=/forms2ng

# CORS allowed origins (* for all, or set specific origin like http://localhost:4200)
forms2ng.cors.allowed-origins=*
